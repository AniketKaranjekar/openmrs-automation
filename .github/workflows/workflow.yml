name: openmrs Automation Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  selenium-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v2

      - name: Verify Setup
        run: |
          java -version
          mvn -version
          google-chrome --version

      - name: Run Tests
        run: mvn clean test -DsuiteXmlFile=testng.xml -Dbrowser=chrome -Dheadless=true

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: TestNG-Reports
          path: target/surefire-reports